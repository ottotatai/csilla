<!DOCTYPE html>
<html lang="hu">
<head>
    <title>Üzenet elküldve</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <link rel="icon" type="image/png" href="icon.png">
    <style>
        body {
            font-family: 'Open Sans', Arial, sans-serif;
            background-color: #1d242a;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        #successMessage {
            background-color: #fff;
            border-radius: 8px;
            padding: 40px 30px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            text-align: center;
            max-width: 450px;
            width: 100%;
        }

        #successIcon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        #successText {
            color: #2e7d32;
            font-size: 22px;
            margin: 0 0 10px 0;
            line-height: 1.4;
        }

        #successSubtext {
            color: #666;
            font-size: 15px;
            margin: 0 0 25px 0;
            line-height: 1.5;
        }

        #backButton {
            padding: 12px 30px;
            background-color: #4f4fcc;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            transition: background-color 0.3s ease;
        }

        #backButton:hover {
            background-color: #3b3ba3;
        }

        @media screen and (max-width: 480px) {
            #successMessage {
                padding: 30px 20px;
            }
            #successText {
                font-size: 18px;
            }
            #backButton {
                width: 100%;
                padding: 14px 20px;
            }
        }
    </style>
</head>
<body>

<div id="successMessage">
    <div id="successIcon">✅</div>
    <p id="successText">Üzenet sikeresen elküldve!</p>
    <p id="successSubtext">Köszönöm megkeresését, hamarosan válaszolok!</p>
    <button id="backButton">Vissza a kezdőlapra</button>
</div>

<script>
    const backButton = document.getElementById('backButton');

    backButton.addEventListener('click', function() {
        window.location.href = 'https://ottotatai.github.io/csilla';
    });
</script>

</body>
</html>
